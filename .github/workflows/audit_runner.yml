name: Guacharito Data & Forecast Sync

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  sincronizar_datos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v3

      - name: Configurar Entorno Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependencias
        run: |
          pip install requests beautifulsoup4 pandas lxml

      - name: Ejecutar Extractor y Análisis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scraper_guacharito.py
          python auditoria_backtest.py

      - name: Guardar Cambios en GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add historico_resultados.csv analisis_brujo.txt reporte_auditoria.txt
          git commit -m "Sincronización, Telegram y Auditoría QA" || echo "No hay cambios nuevos para guardar"
          git push
